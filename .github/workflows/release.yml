name: Release and Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*' # Triggers on version tags like v1.2.3

permissions:
  id-token: write   # Required for NuGet.org Trusted Publishing (OIDC)
  contents: write   # Required to create the GitHub release

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Update .csproj version
        run: |
          sed -i 's|<Version>.*</Version>|<Version>${{ env.VERSION }}</Version>|' Nem_LanguageInfo/Nem_LanguageInfo.csproj

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutput=./TestResults/Coverage/ /p:CoverletOutputFormat=cobertura /p:Threshold=80 /p:ThresholdType=line /p:ThresholdStat=total

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack NuGet package
        run: dotnet pack Nem_LanguageInfo/Nem_LanguageInfo.csproj --configuration Release --output ./nupkg

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: MMoosman # NuGet.org account username that owns the Trusted Publishing policy

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
